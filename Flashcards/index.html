<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Flashcards</title>
</head>


<body>


<header>

    <div class="container">

        <div class="nav">

            <h1>Flashcards</h1>


            <div>

                <button onclick="delFlashcards()">
                    Delete Selected
                </button>

            </div>


        </div>

    </div>


</header>



<main>


<div class="container">


    <!-- CREATE FLASHCARD BOX ALWAYS VISIBLE -->

    <div class="create-box">


        <h2>Create Flashcard</h2>


        <label for="question">
            Question
        </label>


        <textarea id="question"
        placeholder="Type your question"></textarea>



        <label for="answer">
            Answer
        </label>


        <textarea id="answer"
        placeholder="Type your answer"></textarea>



        <button onclick="addFlashcard()">
            Save Flashcard
        </button>


    </div>



    <!-- FLASHCARDS WILL APPEAR HERE -->

    <div class="flashcards"></div>


</div>


</main>




<script src="index.js"></script>


</body>

</html>
