<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>Document</title>
</head>

<body>

    <div class="video">
        <video src="money.mp4" loop muted autoplay></video>
        <div class="mask"></div>
    </div>

    <div class="container">

        <h1>Currency Converter</h1>

        <form class="converter-form" id="converterForm">

            <div class="currency-row">

                <div class="currency-input">
                    <label for="amount">value</label>
                    <input type="number" id="amount" placeholder="Enter amount" step="0.1" min="0" required>

                </div>

                <div class="currency-select">
                    <label for="fromCurrency">From</label>
                    <select id="fromCurrency" required>
                        <option value="USD" selected>USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="JPY">JPY</option>
                        <option value="BRL">BRL</option>

                    </select>
                </div>
            </div>


            <div class="currency-row">

                <div class="currency-input">
                    <label for="covertedAmount">Result</label>
                    <input type="text" id="covertedAmount" placeholder="Converted amount" step="0.1" min="0" required>

                </div>

                <div class="currency-select">
                    <label for="toCurrency">To</label>
                    <select id="toCurrency" required>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="JPY" selected>JPY</option>
                        <option value="BRL">BRL</option>

                    </select>
                </div>
            </div>

            <button type="submit" class="converter-btn" id="convertBtn">
                💵 convert currency
            </button>

        </form>



        <div class="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>

        <div class="result"></div>

        <div class="info">
            <p>
                Tax update in real time
            </p>
        </div>


    </div>
</body>
<script src="script.js"></script>

</html>
